name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Don't cancel in-progress runs — Pages
# rejects partial uploads.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute short commit hash
        run: echo "VITE_APP_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Build
        env:
          # Only tag pushes get a stamped version; main-branch builds keep the
          # "Pre-alpha" fallback the sidebar uses by default.
          VITE_APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          # Short commit hash, appended to the "Pre-alpha" label on untagged
          # builds so a deployed page identifies the exact build it came from.
          VITE_APP_COMMIT: ${{ env.VITE_APP_COMMIT }}
          # Canonical origin for absolute SEO/social URLs (og:image, canonical).
          # Set the SITE_URL repo variable to e.g. https://scrolled.dev. Forks
          # that don't set it ship root-relative URLs (no rich embeds).
          VITE_SITE_URL: ${{ vars.SITE_URL }}
          # Pageview analytics activate only when all three are non-empty
          # AND the deployed hostname matches the allowlist at runtime. Forks
          # don't inherit repo variables on their own Pages deploys, so they
          # ship with no beacon.
          VITE_ANALYTICS_PROVIDER: ${{ vars.ANALYTICS_PROVIDER }}
          VITE_ANALYTICS_TOKEN: ${{ vars.ANALYTICS_TOKEN }}
          VITE_ANALYTICS_ALLOWED_HOSTS: ${{ vars.ANALYTICS_ALLOWED_HOSTS }}
        run: pnpm build

      - name: SPA fallback (copy index.html to 404.html)
        # GitHub Pages serves 404.html for any unmatched path. Reusing
        # index.html means deep links boot the SPA and React Router handles
        # the route — the URL in the address bar is preserved.
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
