<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Scrolled</title>
    <meta
      name="description"
      content="Browse items, equips, mobs, NPCs, maps, and quests from your own game data — a fast, searchable wiki that runs entirely in your browser."
    />
    <link rel="canonical" href="__SITE_URL__/" />

    <!-- Open Graph (Discord, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scrolled" />
    <meta property="og:title" content="Scrolled" />
    <meta
      property="og:description"
      content="Browse items, equips, mobs, NPCs, maps, and quests from your own game data — a fast, searchable wiki that runs entirely in your browser."
    />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__SITE_URL__/icon-512.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Scrolled" />
    <meta
      name="twitter:description"
      content="Browse items, equips, mobs, NPCs, maps, and quests from your own game data — a fast, searchable wiki that runs entirely in your browser."
    />
    <meta name="twitter:image" content="__SITE_URL__/icon-512.png" />
    <script>
      // Apply persisted theme + accent before paint to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('scrolled.theme');
          var dark =
            stored === 'dark' ||
            (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          var accent = localStorage.getItem('scrolled.accent');
          document.documentElement.setAttribute('data-accent', accent || 'green');
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
